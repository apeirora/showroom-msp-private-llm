name: llm.example.com/private-llm
version: ${VERSION}
provider:
  name: ${GITHUB_REPOSITORY_OWNER}

resources:
  - name: oci-helm-chart-private-llm-operator
    type: helmChart
    version: "${VERSION}"
    access:
      type: ociArtifact
      imageReference: ghcr.io/${GITHUB_REPOSITORY_OWNER}/charts/private-llm-operator:${CHART_TAG}

  - name: private-llm-image
    type: ociImage
    version: "${VERSION}"
    access:
      type: ociArtifact
      imageReference: ghcr.io/${GITHUB_REPOSITORY_OWNER}/private-llm-controller:${IMAGE_TAG}

  - name: kro-resource-graph-definition
    type: blob
    version: "${VERSION}"
    input:
      type: file
      path: ../ocm/kro/resourcegroup.yaml

