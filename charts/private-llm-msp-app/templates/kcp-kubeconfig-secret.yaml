{{- /*
Emit the sync-agent KCP Secret only when the caller passed an admin kubeconfig
inline AND hasn't pointed at an externally-provisioned Secret. This lets CI
run `helm template` with no values without tripping a `required` check, and
lets prod use its ExternalSecret-sourced pm-kubeconfig unchanged.
*/ -}}
{{- if and (not .Values.kcpKubeconfig.existingSecret) .Values.kcpKubeconfig.adminContent }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.kcpKubeconfig.secretName }}
  namespace: {{ include "private-llm-msp-app.syncAgentNamespace" . }}
type: Opaque
stringData:
  kubeconfig: |
{{ include "private-llm-msp-app.rewriteKubeconfig" . | indent 4 }}
{{- end }}
