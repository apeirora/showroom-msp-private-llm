apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: private-llm-metrics-auth-rolebinding
  labels:
    {{- include "private-llm-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: private-llm-metrics-auth-role
subjects:
- kind: ServiceAccount
  name: private-llm-controller-manager
  namespace: {{ .Release.Namespace }}
