{{- if .Values.portalIntegration.enabled }}
{{- $remoteNs := .Values.portalIntegration.kubeconfig.secretNamespace | default .Release.Namespace }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-portal-integration-init
  namespace: {{ $remoteNs }}
  labels:
    {{- include "private-llm-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: portal-integration
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      labels:
        {{- include "private-llm-operator.labels" . | nindent 8 }}
        app.kubernetes.io/component: portal-integration
    spec:
      restartPolicy: Never
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
      {{- range .Values.imagePullSecrets }}
        - name: {{ .name }}
      {{- end }}
      {{- end }}
      containers:
        - name: kubectl
          image: {{ .Values.portalIntegration.kubectl.image.repository }}:{{ .Values.portalIntegration.kubectl.image.tag }}
          imagePullPolicy: {{ .Values.portalIntegration.kubectl.image.pullPolicy }}
          command: ["/bin/sh","-c"]
          args:
            - |
              set -euo pipefail
              KUBECONFIG_PATH=/kubeconfig/{{ .Values.portalIntegration.kubeconfig.key }}
              echo "Applying APIExport, ProviderMetadata, and ContentConfiguration using $KUBECONFIG_PATH"
              kubectl --kubeconfig="$KUBECONFIG_PATH" apply -f /manifests/apiexport.yaml
              kubectl --kubeconfig="$KUBECONFIG_PATH" apply -f /manifests/providermetadata.yaml
              kubectl --kubeconfig="$KUBECONFIG_PATH" apply -f /manifests/contentconfiguration.yaml
          volumeMounts:
            - name: kubeconfig
              mountPath: /kubeconfig
              readOnly: true
            - name: apiexport
              mountPath: /manifests/apiexport.yaml
              subPath: apiexport.yaml
              readOnly: true
            - name: providermetadata
              mountPath: /manifests/providermetadata.yaml
              subPath: providermetadata.yaml
              readOnly: true
            - name: contentconfiguration
              mountPath: /manifests/contentconfiguration.yaml
              subPath: contentconfiguration.yaml
              readOnly: true
      volumes:
        - name: kubeconfig
          secret:
            secretName: {{ required "portalIntegration.kubeconfig.secretName is required when portalIntegration.enabled=true" .Values.portalIntegration.kubeconfig.secretName }}
        - name: apiexport
          configMap:
            name: {{ .Release.Name }}-portal-integration-apiexport
        - name: providermetadata
          configMap:
            name: {{ .Release.Name }}-portal-integration-providermetadata
        - name: contentconfiguration
          configMap:
            name: {{ .Release.Name }}-portal-integration-contentconfiguration
{{- end }}


