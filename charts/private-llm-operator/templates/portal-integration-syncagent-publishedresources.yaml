{{- if and .Values.portalIntegration.enabled .Values.portalIntegration.syncAgent.enabled }}
apiVersion: syncagent.kcp.io/v1alpha1
kind: PublishedResource
metadata:
  name: publish-llm-llminstances
  namespace: {{ .Values.portalIntegration.syncAgent.namespace | default "api-syncagent" }}
  labels:
    {{- include "private-llm-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: portal-integration
spec:
  resource:
    kind: LLMInstance
    apiGroup: llm.privatellms.msp
    version: v1alpha1
  naming:
    namespace: "{{`{{ .ClusterName }}`}}"
    name: "{{`{{ .Object.metadata.name }}`}}"
---
apiVersion: syncagent.kcp.io/v1alpha1
kind: PublishedResource
metadata:
  name: publish-llm-apitokenrequests
  namespace: {{ .Values.portalIntegration.syncAgent.namespace | default "api-syncagent" }}
  labels:
    {{- include "private-llm-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: portal-integration
spec:
  resource:
    kind: APITokenRequest
    apiGroup: llm.privatellms.msp
    version: v1alpha1
  naming:
    namespace: "{{`{{ .ClusterName }}`}}"
    name: "{{`{{ .Object.metadata.name }}`}}"
  related:
    - identifier: token-secret
      origin: service
      kind: Secret
      object:
        reference:
          path: status.secretName
{{- end }}


