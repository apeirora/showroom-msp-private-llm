{{- if .Values.portalIntegration.enabled }}
{{- $sidebarTitle := .Values.branding.sidebar.title -}}
{{- $secretDef := default (dict) .Values.portalIntegration.secretResourceDefinition -}}
{{- $secretGroup := default "v1" $secretDef.group -}}
{{- $secretPlural := default "secrets" $secretDef.plural -}}
{{- $secretSingular := default "secret" $secretDef.singular -}}
{{- $secretKind := default "Secret" $secretDef.kind -}}
{{- $secretVersion := "v1" -}}
{{- if hasKey $secretDef "version" -}}
{{- $secretVersion = printf "%v" (get $secretDef "version") -}}
{{- end -}}
{{- $contentVariant := default "default" .Values.portalIntegration.contentVariant -}}
{{- $pmContentFile := "files/pm-content.json" -}}
{{- if eq $contentVariant "legacy" -}}
{{- $pmContentFile = "files/pm-content-legacy.json" -}}
{{- end -}}
{{- $pmContent := .Files.Get $pmContentFile -}}
{{- $pmContent = replace "__SIDEBAR_TITLE__" $sidebarTitle $pmContent -}}
{{- $pmContent = replace "__SECRET_GROUP__" $secretGroup $pmContent -}}
{{- $pmContent = replace "__SECRET_VERSION__" $secretVersion $pmContent -}}
{{- $pmContent = replace "__SECRET_PLURAL__" $secretPlural $pmContent -}}
{{- $pmContent = replace "__SECRET_SINGULAR__" $secretSingular $pmContent -}}
{{- $pmContent = replace "__SECRET_KIND__" $secretKind $pmContent -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-portal-integration-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "private-llm-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: portal-integration
data:
  pm-content.json: |-
{{ $pmContent | indent 4 }}
{{- end }}
