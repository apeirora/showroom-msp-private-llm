{{- if .Values.portalIntegration.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-portal-integration
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "private-llm-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: portal-integration
  annotations:
    {{- $annotations := merge (dict) (.Values.ingress.extraAnnotations | default dict) (.Values.portalIntegration.ingress.annotations | default dict) -}}
    {{- if $annotations }}
{{ toYaml $annotations | indent 4 }}
    {{- end }}
spec:
  {{- $ingressClassName := "" }}
  {{- if .Values.ingress.className }}
    {{- $ingressClassName = .Values.ingress.className }}
  {{- else if and .Values.traefik.enabled .Values.traefik.ingressClass.name }}
    {{- $ingressClassName = .Values.traefik.ingressClass.name }}
  {{- end }}
  {{- if $ingressClassName }}
  ingressClassName: {{ $ingressClassName }}
  {{- end }}
  rules:
    - host: {{ coalesce (index (.Values.global | default dict) "publicHost") .Values.PUBLIC_HOST "localhost" | quote }}
      http:
        paths:
          - path: {{ .Values.portalIntegration.contentPath | default "/pm-content.json" | quote }}
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-portal-integration
                port:
                  number: 80
  {{- if .Values.tls.secretName }}
  tls:
    - hosts:
        - {{ coalesce (index (.Values.global | default dict) "publicHost") .Values.PUBLIC_HOST "localhost" | quote }}
      secretName: {{ .Values.tls.secretName }}
  {{- end }}
{{- end }}


