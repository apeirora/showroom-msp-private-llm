PUBLIC_HOST: localhost
PUBLIC_SCHEME: http
tls:
  secretName: ''
ocm:
  enabled: true
auth:
  externalURL: ''
image:
  repository: ghcr.io/apeirora/private-llm-controller
  tag: 2.3.1
  pullPolicy: IfNotPresent
imagePullSecrets: []
extraEnv: []
traefik:
  enabled: true
  ingressClass:
    enabled: true
    isDefaultClass: false
    name: traefik
  service:
    type: LoadBalancer
ingress:
  className: ''
  extraAnnotations: {}
  ports:
    web:
      nodePort: 30080
    websecure:
      nodePort: 30443
portalIntegration:
  enabled: false
  contentPath: /pm-content.json
  image:
    repository: nginx
    tag: '1.25'
    pullPolicy: IfNotPresent
  resources: {}
  ingress:
    annotations: {}
  kubeconfig:
    secretName: ''
    secretNamespace: ''
    key: kubeconfig
  kubectl:
    image:
      repository: bitnami/kubectl
      tag: latest
      pullPolicy: IfNotPresent
  syncAgent:
    enabled: false
    namespace: api-syncagent
