PUBLIC_HOST: localhost
PUBLIC_SCHEME: http
tls:
  secretName: ''
ocm:
  enabled: true
auth:
  externalURL: ''
image:
  repository: ghcr.io/apeirora/private-llm-controller
  tag: 2.12.4
  pullPolicy: IfNotPresent
imagePullSecrets: []
extraEnv: []
traefik:
  enabled: true
  ingressClass:
    enabled: true
    isDefaultClass: false
    name: traefik
  service:
    type: LoadBalancer
ingress:
  className: ''
  extraAnnotations: {}
  ports:
    web:
      nodePort: 30080
    websecure:
      nodePort: 30443
portalIntegration:
  enabled: false
  contentVariant: default
  contentPath: /pm-content.json
  # Maps onto the portal-ui-lib >= 0.43.0 resourceDefinition schema:
  # group -> apiGroup (GraphQL gateway root field), plural -> entityCollection
  # (must match the gateway schema field, PascalCase), kind -> entity.
  # version stays empty for core/v1 resources so the query nests as
  # v1 { Secrets } instead of v1 { v1 { Secrets } }.
  secretResourceDefinition:
    group: v1
    version: ""
    plural: Secrets
    kind: Secret
  image:
    repository: nginx
    tag: '1.25'
    pullPolicy: IfNotPresent
  resources: {}
  ingress:
    annotations: {}
branding:
  sidebar:
    title: LLM by MODEL Corp
