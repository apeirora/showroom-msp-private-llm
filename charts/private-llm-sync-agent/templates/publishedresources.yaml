{{- if .Values.publishedResources.enabled }}
apiVersion: syncagent.kcp.io/v1alpha1
kind: PublishedResource
metadata:
  name: publish-llm-llminstances
  namespace: {{ .Values.publishedResources.namespace | default .Release.Namespace }}
  labels:
    app.kubernetes.io/name: private-llm-sync-agent
    app.kubernetes.io/component: portal-integration
spec:
  resource:
    kind: LLMInstance
    apiGroup: llm.privatellms.msp
    version: v1alpha1
  naming:
    namespace: "{{`{{ .ClusterName }}`}}"
    name: "{{`{{ .Object.metadata.name }}`}}"
  related:
    # BYOC mode: sync the user-supplied cluster kubeconfig Secret referenced
    # by spec.clusterRef from the kcp workspace down to the service cluster.
    # Resolved via template, not reference: form clients submit
    # clusterRef.kubeconfigSecretName="" for as-a-Service instances, and the
    # empty string round-trips asymmetrically (dropped on the service-cluster
    # copy), which makes reference resolution error out and block deletion.
    # An empty template render skips the related resource cleanly instead.
    - identifier: byoc-kubeconfig
      origin: kcp
      kind: Secret
      object:
        template:
          template: "{{`{{ with .Object.spec.clusterRef }}{{ with .kubeconfigSecretName }}{{ . }}{{ end }}{{ end }}`}}"
---
apiVersion: syncagent.kcp.io/v1alpha1
kind: PublishedResource
metadata:
  name: publish-llm-apitokenrequests
  namespace: {{ .Values.publishedResources.namespace | default .Release.Namespace }}
  labels:
    app.kubernetes.io/name: private-llm-sync-agent
    app.kubernetes.io/component: portal-integration
spec:
  resource:
    kind: APITokenRequest
    apiGroup: llm.privatellms.msp
    version: v1alpha1
  naming:
    namespace: "{{`{{ .ClusterName }}`}}"
    name: "{{`{{ .Object.metadata.name }}`}}"
  related:
    - identifier: token-secret
      origin: service
      kind: Secret
      object:
        reference:
          path: status.secretName
{{- end }}

