  labels:
    ui.platform-mesh.io/content-for: llm.privatellms.msp
# spec omitted deliberately — the sync-agent owns spec.permissionClaims and
# spec.resources (it writes via v1alpha1 with `all: true` claims). If the
# chart also shipped claims, their v1alpha2-to-v1alpha1 conversion would
# drop the `all` marker, sync-agent would treat them as missing and append
# duplicates, whole patch would fail validation, and spec.resources would
# never be populated. Keeping the chart's template to just the shell
# (metadata only) lets the sync-agent converge cleanly on first install.
