apiVersion: apis.kcp.io/v1alpha2
kind: APIExport
metadata:
  name: llm.privatellms.msp
  labels:
    ui.platform-mesh.io/content-for: llm.privatellms.msp
spec:
  # Canonical v1alpha2 shape — matches ECOFed/CNPG which publish to the
  # marketplace successfully. Do NOT add `all: true`; the live CRD schema
  # on cc-d2 does not declare that field and Flux's server-side dry-run
  # rejects the manifest.
  #
  # Known-limitation: sync-agent does not cleanly populate
  # `spec.resources` on first install when the chart creates the APIExport
  # (its v1alpha1 write conflicts with the v1alpha2 stored shape). The
  # deployer preserves a manual patch via `driftDetection.ignore` on
  # `/spec/resources`. Proper fix is to stop shipping the APIExport from
  # this chart and let the sync-agent be the sole owner (ECOFed pattern).
  permissionClaims:
    - group: ""
      resource: namespaces
      verbs: ["*"]
    - group: ""
      resource: events
      verbs: ["*"]
    - group: ""
      resource: secrets
      verbs: ["*"]
