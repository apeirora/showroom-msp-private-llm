apiVersion: apis.kcp.io/v1alpha2
kind: APIExport
metadata:
  name: llm.privatellms.msp
  labels:
    ui.platform-mesh.io/content-for: llm.privatellms.msp
spec:
  # Each claim needs `all: true` (or `resourceSelector`); KCP validation
  # rejects claims with neither. The sync-agent's APIExport reconciler only
  # treats claims with `all: true` as already-existing, so shipping them in
  # the `verbs: ["*"]` shape caused the sync-agent to re-add duplicates,
  # whole patch rejected, and spec.resources never populated — which in turn
  # made the provider disappear from the marketplace listing.
  permissionClaims:
    - group: ""
      resource: namespaces
      all: true
    - group: ""
      resource: events
      all: true
    - group: ""
      resource: secrets
      all: true
