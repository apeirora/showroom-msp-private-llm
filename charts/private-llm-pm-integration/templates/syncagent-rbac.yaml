# RBAC for sync-agent to access exported resources in the KCP virtual workspace
# The sync-agent authenticates as "cluster-admin" via client certificates
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: syncagent-resources-access
rules:
  - apiGroups:
      - llm.privatellms.msp
    resources:
      - llminstances
      - apitokenrequests
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - namespaces
      - events
      - secrets
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: syncagent-resources-access
subjects:
  - kind: User
    name: cluster-admin
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: syncagent-resources-access
  apiGroup: rbac.authorization.k8s.io
