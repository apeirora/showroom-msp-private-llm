{{- $marketplaceTitle := dig "marketplace" "title" .Values | default "LLM Service" -}}
{{- $marketplaceDescription := dig "marketplace" "description" .Values | default "LLM services provided by MODEL Crop." -}}
apiVersion: ui.platform-mesh.io/v1alpha1
kind: ProviderMetadata
metadata:
  name: llm.privatellms.msp
spec:
  displayName: {{ $marketplaceTitle | quote }}
  description: |
{{ $marketplaceDescription | nindent 4 }}
  contacts:
    - displayName: Alex IT Architect
      email: alex.it.architect@privatellms.msp
      role: ["IT Architect"]
  preferredSupportChannels:
    - displayName: ApeiroRA Help Desk
      url: https://help.privatellms.msp
  icon:
    light:
      data: 'data:image/png;base64,{{ (.Files.Get "files/icon.png") | b64enc }}'
    dark:
      data: 'data:image/png;base64,{{ (.Files.Get "files/icon.png") | b64enc }}'
