apiVersion: delivery.ocm.software/v1alpha1
kind: ComponentVersion
metadata:
  name: bootstrap-component
  namespace: ocm-system
spec:
  component: llm.privatellms.msp/private-llm
  version:
    semver: "${VERSION}"
  repository:
    url: ghcr.io/${GH_OWNER}/ocm
    secretRef:
      name: ghcr-credentials
  interval: 1m
---
apiVersion: delivery.ocm.software/v1alpha1
kind: Resource
metadata:
  name: bootstrap-rgd
  namespace: ocm-system
spec:
  interval: 1m
  sourceRef:
    kind: ComponentVersion
    name: bootstrap-component
    namespace: ocm-system
    resourceRef:
      name: kro-resource-graph-definition
---
apiVersion: delivery.ocm.software/v1alpha1
kind: FluxDeployer
metadata:
  name: bootstrap-deployer
  namespace: ocm-system
spec:
  interval: 1m
  sourceRef:
    kind: Resource
    name: bootstrap-rgd
    namespace: ocm-system
