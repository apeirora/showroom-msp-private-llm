apiVersion: delivery.ocm.software/v1alpha1
kind: ComponentVersion
metadata:
  name: private-llm
  namespace: ocm-system
spec:
  component: llm.privatellms.msp/private-llm
  version:
    semver: "${VERSION}"
  repository:
    url: ghcr.io/${GH_OWNER}/ocm
    secretRef:
      name: ghcr-credentials
  interval: 1m
---
apiVersion: delivery.ocm.software/v1alpha1
kind: Resource
metadata:
  name: private-llm-chart
  namespace: ocm-system
spec:
  interval: 1m
  sourceRef:
    kind: ComponentVersion
    name: private-llm
    namespace: ocm-system
    resourceRef:
      name: oci-helm-chart-private-llm-operator
---
apiVersion: delivery.ocm.software/v1alpha1
kind: FluxDeployer
metadata:
  name: private-llm
  namespace: ocm-system
spec:
  interval: 1m
  sourceRef:
    kind: Resource
    name: private-llm-chart
    namespace: ocm-system
  helmReleaseTemplate:
    releaseName: private-llm-operator
    targetNamespace: private-llm-system
    values:
      PUBLIC_HOST: llm.example.com
      PUBLIC_SCHEME: http
      traefik:
        enabled: false
      imagePullSecrets:
        - name: ghcr-credentials
