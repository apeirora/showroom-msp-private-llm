apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: private-llm-operator-bootstrap
spec:
  schema:
    apiVersion: v1alpha1
    kind: PrivateLlmOperatorRelease
    spec:
      targetNamespace: string | default="default"
      publicHost: string | default="localhost"
      publicScheme: string | default="http"
      imagePullSecretName: string | default="ghcr-credentials"
      imagePullPolicy: string | default="IfNotPresent"
      traefikEnabled: boolean | default=true
      traefikServiceType: string | default="LoadBalancer"
      traefikNodePortWeb: integer | default=30080
      traefikNodePortWebsecure: integer | default=30443
      tlsSecretName: string | default=""
      ingressExtraAnnotations: map[string]string | default={}
  resources:
    - id: ns
      template:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.targetNamespace}

    # Fetch Helm chart resource from the OCM component
    - id: resourceChart
      template:
        apiVersion: delivery.ocm.software/v1alpha1
        kind: Resource
        metadata:
          name: bootstrap-helm-resource
          namespace: ocm-system
        spec:
          componentRef:
            name: bootstrap-component
          resource:
            byReference:
              resource:
                name: oci-helm-chart-private-llm-operator
          additionalStatusFields:
            registry: resource.access.imageReference.toOCI().registry
            repository: resource.access.imageReference.toOCI().repository
            tag: resource.access.imageReference.toOCI().tag
          interval: 1m
          ocmConfig:
            - kind: Repository
              apiVersion: delivery.ocm.software/v1alpha1
              name: bootstrap-repository
              namespace: ocm-system

    # Fetch operator image resource from the OCM component and split reference
    - id: resourceImage
      template:
        apiVersion: delivery.ocm.software/v1alpha1
        kind: Resource
        metadata:
          name: bootstrap-image-resource
          namespace: ocm-system
        spec:
          componentRef:
            name: bootstrap-component
          resource:
            byReference:
              resource:
                name: private-llm-image
          additionalStatusFields:
            registry: resource.access.imageReference.toOCI().registry
            repository: resource.access.imageReference.toOCI().repository
            tag: resource.access.imageReference.toOCI().tag
          interval: 1m
          ocmConfig:
            - kind: Repository
              apiVersion: delivery.ocm.software/v1alpha1
              name: bootstrap-repository
              namespace: ocm-system

    - id: ocirepository
      template:
        apiVersion: source.toolkit.fluxcd.io/v1
        kind: OCIRepository
        metadata:
          name: private-llm-operator
          namespace: ${ns.metadata.name}
        spec:
          interval: 1m0s
          layerSelector:
            mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip"
            operation: copy
          url: oci://${resourceChart.status.additional.?registry}/${resourceChart.status.additional.?repository}
          ref:
            tag: ${resourceChart.status.additional.?tag}
          secretRef:
            name: ${schema.spec.imagePullSecretName}

    - id: helmrelease
      template:
        apiVersion: helm.toolkit.fluxcd.io/v2
        kind: HelmRelease
        metadata:
          name: private-llm-operator
          namespace: ${ns.metadata.name}
        spec:
          interval: 1m0s
          releaseName: private-llm-operator
          targetNamespace: ${ns.metadata.name}
          install:
            createNamespace: true
          chartRef:
            kind: OCIRepository
            name: private-llm-operator
            namespace: ${ns.metadata.name}
          values:
            PUBLIC_HOST: ${schema.spec.publicHost}
            PUBLIC_SCHEME: ${schema.spec.publicScheme}
            tls:
              secretName: ${schema.spec.tlsSecretName}
            image:
              repository: ${resourceImage.status.additional.?registry}/${resourceImage.status.additional.?repository}
              tag: ${resourceImage.status.additional.?tag}
              pullPolicy: ${schema.spec.imagePullPolicy}
            imagePullSecrets:
              - name: ${schema.spec.imagePullSecretName}
            traefik:
              enabled: ${schema.spec.traefikEnabled}
              service:
                type: ${schema.spec.traefikServiceType}
              ports:
                web:
                  nodePort: ${schema.spec.traefikNodePortWeb}
                websecure:
                  nodePort: ${schema.spec.traefikNodePortWebsecure}
            ingress:
              extraAnnotations: ${schema.spec.ingressExtraAnnotations}
