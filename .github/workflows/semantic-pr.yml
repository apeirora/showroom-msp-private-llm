name: Semantic PR Title

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

jobs:
  semantic:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            docs
            chore
            build
            ci
            test
            style
            revert
          scopes: |
            api
            controller
            auth
            crd
            rbac
            chart
            docs
            release
            deps
            main
          requireScope: false


