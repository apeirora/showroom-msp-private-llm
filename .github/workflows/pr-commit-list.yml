name: PR Commit List

on:
  pull_request_target:
    types: [opened, synchronize, edited]

permissions:
  pull-requests: write

jobs:
  update-body:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const {owner, repo} = context.repo;
            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner, repo, pull_number: pr.number, per_page: 100
            });
            const lines = commits.map(c => `- ${c.commit.message.split('\n')[0]} (${c.sha.substring(0,7)})`).join('\n');
            const start = '<!-- commits:start -->';
            const end = '<!-- commits:end -->';
            let body = pr.body || '';
            const block = `${start}\n${lines}\n${end}`;
            if (body.includes(start) && body.includes(end)) {
              body = body.replace(new RegExp(`${start}[\\s\\S]*?${end}`), block);
            } else {
              body += `\n\n### Included commits\n${block}\n`;
            }
            await github.rest.pulls.update({owner, repo, pull_number: pr.number, body});


