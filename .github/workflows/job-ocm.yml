name: OCM
on:
  workflow_call:
    inputs:
      chartPath:
        required: true
        type: string
      componentName:
        required: true
        type: string
      componentConstructorFile:
        required: false
        type: string
        default: .ocm/component-constructor.yaml
      REPO_ORG:
        required: false
        type: string
        default: apeirora
      REPO_NAME:
        required: true
        type: string

jobs:
  ocm:
    runs-on: [self-hosted]
    steps:
      - id: docker_token
        name: Authenticate to Artifactory
        uses: hashicorp/vault-action@v3
        with:
          url: https://vault.tools.sap
          method: approle
          namespace: ies/hyperspace/pipelines
          roleId: ${{ secrets.PIPER_VAULTAPPROLEID }}
          secretId: ${{ secrets.PIPER_VAULTAPPROLESECRETID }}
          exportEnv: false
          secrets: |
            piper/data/sap-project-apeirora/GROUP-SECRETS/docker-registry targetRegistryPassword | gh_token ;
      - name: Setup yq@latest
        run: |
          if ! command -v yq &>/dev/null
          then
            mkdir -p /home/runner/.local/bin
            wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /home/runner/.local/bin/yq &&\
              chmod +x /home/runner/.local/bin/yq
          fi
      - name: Setup gh cli
        run: |
          if ! command -v gh &>/dev/null
          then
            sudo apt update && sudo apt install gh -y
          fi
      - name: Check out the repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: setup OCM CLI
        run: |
          REPO=${repo:=open-component-model/ocm}
          if [ -z "$version" -o "$version" == latest ]; then
            version="$(basename "$(curl -Ls -o /dev/null -w %{url_effective} https://github.com/$REPO/releases/latest)")"
            echo "Selecting latest version: $version"
          fi
          VERSION=${version#v}
          ARCHIVE_FILE="ocm-${VERSION}-linux-amd64.tar.gz"
          URL="https://github.com/$REPO/releases/download/v${VERSION}/$ARCHIVE_FILE"
          echo "Installing ocm-cli version $version from $REPO"
          BIN_DIR=/home/runner/.local/bin
          mkdir -p "$BIN_DIR"
          curl -LsS -o "$BIN_DIR/ocm-cli.tgz" "$URL"
          tar --overwrite -xvzf "$BIN_DIR/ocm-cli.tgz" -C "$BIN_DIR" >/dev/null
          chmod a+x "$BIN_DIR/ocm"
      - name: Prepare Template Variables
        env:
          GH_HOST: github.tools.sap
          GH_ENTERPRISE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -x
          IMAGE_NAME=$(yq '.image.name' ${{ inputs.chartPath }}/values.yaml)
          APP_VERSION=$(yq '.appVersion' ${{ inputs.chartPath }}/Chart.yaml)
          CHART_NAME=$(yq '.name' ${{ inputs.chartPath }}/Chart.yaml)
          VERSION=$(yq '.version' ${{ inputs.chartPath }}/Chart.yaml)
          CHART_OCI_PATH=apeiro-showroom.common.repositories.cloud.sap/helm/$CHART_NAME
          IMAGE_REPO_SHA=$(gh api --hostname "$GH_HOST" repos/${{ inputs.REPO_ORG}}/${{ inputs.REPO_NAME }}/git/ref/tags/$APP_VERSION | jq -r '.object.sha')
          
          echo "IMAGE_REPO_SHA=$IMAGE_REPO_SHA" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
          echo "CHART_REPO=https://github.tools.sap/ApeiroRA/private-llm-operator" >> $GITHUB_ENV
          echo "CHART_OCI_PATH=$CHART_OCI_PATH" >> $GITHUB_ENV

      - name: Update and package chart
        run: |
          echo "${{ steps.docker_token.outputs.art_pass }}" | helm registry login apeiro-showroom.common.repositories.cloud.sap -u "${{ steps.docker_token.outputs.art_user }}" --password-stdin
          helm dependency update ${{ inputs.chartPath }}
          helm package ${{ inputs.chartPath }} --destination . --version "${{ env.VERSION }}"
          ls -al
          ls ./${{ env.CHART_NAME }}-${{ env.VERSION }}.tgz

      - name: Write Credentials file
        run: |
          cat <<EOF > $HOME/.ocmconfig
          type: generic.config.ocm.software/v1
          configurations:
            - type: credentials.config.ocm.software
              consumers:
                - identity:
                    type: OCIRegistry
                    scheme: oci
                    hostname: apeiro-showroom.common.repositories.cloud.sap
                  credentials:
                    - type: Credentials
                      properties:
                        username: C5405474
                        password: ${{ secrets.CR_DOCKER_SECRET }}
          EOF
      - name: create OCM ComponentArchive
        run: |
          ocm_ctf=.ocm/transport.ctf
          mkdir -p "$(dirname "$ocm_ctf")"
          ./ocm add components -c --templater=go --file "$ocm_ctf" ${{ inputs.componentConstructorFile }} -- \
            VERSION=${{ env.VERSION }} \
            APP_VERSION=${{ env.APP_VERSION}} \
            IMAGE_NAME=${{ env.IMAGE_NAME}} \
            COMMIT=${{ github.sha }} \
            IMAGE_REPO_SHA=${{ env.IMAGE_REPO_SHA }} \
            CHART_REPO=${{ env.CHART_REPO }} \
            COMPONENT_NAME=${{ inputs.componentName }} \
            CHART_OCI_PATH=${{ env.CHART_OCI_PATH }} \
            LOCAL_CHART_PATH=${{ inputs.chartPath }}
      - name: Transfer to OCM REPO
        env:
          BIN_DIR: /home/runner/.local/bin
        run: |
          $BIN_DIR/ocm transfer ctf --overwrite .ocm/transport.ctf "apeiro-showroom.common.repositories.cloud.sap"

