name: Release Please

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - id: release
        uses: googleapis/release-please-action@v4.3.0
        with:
          skip-github-pull-request: false
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

