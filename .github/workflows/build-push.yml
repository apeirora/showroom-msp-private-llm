name: Release

on:
  push:
    tags:
      - 'v*'
      - '*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  publish-image:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.vars.outputs.version }}
      image: ${{ steps.meta.outputs.image }}
      chart_registry: ${{ steps.meta.outputs.chart_registry }}
      ocm_repository: ${{ steps.meta.outputs.ocm_repository }}
      image_digest: ${{ steps.dig.outputs.digest }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Derive version from tag
        id: vars
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Prepare metadata
        id: meta
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "image=ghcr.io/${owner}/private-llm-controller" >> "$GITHUB_OUTPUT"
          echo "chart_registry=oci://ghcr.io/${owner}/charts" >> "$GITHUB_OUTPUT"
          echo "ocm_repository=oci://ghcr.io/${owner}/ocm" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push multi-arch Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.vars.outputs.version }}
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.vars.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Capture image digest
        id: dig
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ steps.meta.outputs.image }}:${{ steps.vars.outputs.version }}
        run: |
          set -e
          if [ -z "$DIGEST" ]; then
            DIGEST="unknown"
          fi
          FULL="${IMAGE%%:*}@${DIGEST}"
          echo "$FULL" | tee image-digest.txt
          echo "digest=$FULL" >> "$GITHUB_OUTPUT"

      - name: Upload image digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-digest
          path: image-digest.txt

  package-chart:
    needs: publish-image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chart:
          - private-llm-operator
          - private-llm-sync-agent
          - private-llm-pm-integration
          - private-llm-msp-app
          - private-llm-pm-app
    env:
      VERSION: ${{ needs.publish-image.outputs.version }}
      CHART_REGISTRY: ${{ needs.publish-image.outputs.chart_registry }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Helm registry login
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username "$GITHUB_ACTOR" --password-stdin

      - name: Package and push chart
        shell: bash
        run: |
          set -euo pipefail
          chart='${{ matrix.chart }}'
          chart_dir="charts/${chart}"
          out_dir="dist/${chart}"
          pkg="${chart}-${VERSION}.tgz"
          echo "::group::${chart}"
          # Pull deps recursively for any sub-chart with its own deps. `helm
          # dep update` on the umbrella alone does not descend, so file:// sub
          # charts get packaged without their own transitive deps (e.g.
          # private-llm-sync-agent loses the api-syncagent sub-chart).
          for sub in charts/*/; do
            if [ -f "$sub/Chart.yaml" ] && grep -q "^dependencies:" "$sub/Chart.yaml"; then
              helm dependency update "$sub"
            fi
          done
          helm dependency update "$chart_dir"
          helm lint "$chart_dir"
          helm template "release-${chart}" "$chart_dir" --namespace default >/dev/null
          mkdir -p "$out_dir"
          helm package "$chart_dir" --destination "$out_dir" --version "$VERSION" --app-version "$VERSION"
          helm push "$out_dir/$pkg" "$CHART_REGISTRY"
          sha256sum "$out_dir/$pkg" > "$out_dir/$pkg.sha256"
          echo "::endgroup::"

      - name: Upload packaged chart
        uses: actions/upload-artifact@v4
        with:
          name: chart-package-${{ matrix.chart }}
          path: dist/${{ matrix.chart }}/*

  publish-release:
    needs:
      - publish-image
      - package-chart
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.publish-image.outputs.version }}
      IMAGE: ${{ needs.publish-image.outputs.image }}
      CHART_REGISTRY: ${{ needs.publish-image.outputs.chart_registry }}
      OCM_REPOSITORY: ${{ needs.publish-image.outputs.ocm_repository }}
      HELM_CHARTS: "private-llm-operator private-llm-sync-agent private-llm-pm-integration private-llm-msp-app private-llm-pm-app"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download chart artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: chart-package-*
          path: dist/charts
          merge-multiple: true

      - name: Download image digest artifact
        uses: actions/download-artifact@v4
        with:
          name: image-digest
          path: .

      - name: Generate aggregated checksums
        run: |
          cat dist/charts/*.sha256 > SHA256SUMS.txt

      - name: Write build metadata
        env:
          CHART_REGISTRY: ${{ needs.publish-image.outputs.chart_registry }}
        run: |
          charts_json="["
          sep=""
          for chart in $HELM_CHARTS; do
            charts_json="${charts_json}${sep}{\"name\":\"${chart}\",\"version\":\"${VERSION}\",\"registry\":\"${CHART_REGISTRY}\"}"
            sep=","
          done
          charts_json="${charts_json}]"
          cat > build-metadata.json <<EOF
          {
            "commit": {
              "sha": "${GITHUB_SHA}"
            },
            "image": {
              "name": "${IMAGE}",
              "tag": "${VERSION}",
              "latest": true
            },
            "charts": ${charts_json}
          }
          EOF

      - name: Install OCM CLI
        run: |
          curl -sSfL https://ocm.software/install.sh | sudo bash

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push OCM component
        run: |
          mkdir -p dist/ctf
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          ocm add componentversions --create --file dist/ctf .ocm/component-constructor.yaml \
            VERSION="${VERSION}" GITHUB_REPOSITORY_OWNER="${owner}" IMAGE_TAG="${VERSION}" CHART_TAG="${VERSION}"
          ocm transfer commontransportarchive dist/ctf "$OCM_REPOSITORY" --copy-resources --overwrite

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/charts/*.tgz
            SHA256SUMS.txt
            image-digest.txt
            build-metadata.json
          fail_on_unmatched_files: true
